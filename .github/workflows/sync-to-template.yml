name: Sync UIKit to Template

on:
  push:
    branches:
      - master
    paths:
      - 'client/uikit/**'
  workflow_dispatch:

jobs:
  sync-to-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project Repo
        uses: actions/checkout@v4
        with:
          path: gus-repo-2

      - name: Checkout Template Repo
        uses: actions/checkout@v4
        with:
          repository: 'brandonkylely/gus-template'
          token: ${{ secrets.SYNC_PAT }}
          path: gus-template

      - name: Sync
        run: |
          mkdir -p "$GITHUB_WORKSPACE/gus-template/client/uikit"

          rsync -av --delete \
            --exclude 'custom/' \
            "$GITHUB_WORKSPACE/gus-repo-2/client/uikit/" "$GITHUB_WORKSPACE/gus-template/client/uikit/"

      - name: Create PR in Template Repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SYNC_PAT }}
          path: gus-template
          commit-message: "chore(uikit): sync updates from ${{ github.event.repository.name }}"
          title: "Sync UIKit from ${{ github.event.repository.name }}"
          body: |
            This is an automated PR to sync shared UIKit components from **${{ github.event.repository.name }}**.
            
            *Note: Files in `client/uikit/custom/` were automatically ignored.*
          branch: sync/uikit-from-${{ github.event.repository.name }}
          base: master
          delete-branch: true